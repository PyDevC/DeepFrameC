<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeepFrameC</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { text-align: center; background: linear-gradient(90deg, #00d9ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-content { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin-top: 2rem; }
        .upload-section, .settings-section { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 2rem; }
        .drop-zone { border: 2px dashed #444; border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; }
        .drop-zone:hover { border-color: #00d9ff; }
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
        .btn-primary { background: linear-gradient(90deg, #00d9ff, #00ff88); color: #1a1a2e; font-weight: bold; }
        .btn-primary:disabled { opacity: 0.5; }
        .result-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 2rem; text-align: center; margin-top: 2rem; }
        .verdict { font-size: 3rem; font-weight: bold; }
        .verdict.fake { color: #ff4757; }
        .verdict.real { color: #2ed573; }
        .probs { display: flex; justify-content: center; gap: 2rem; margin: 2rem 0; }
        input[type="range"] { width: 100%; accent-color: #00d9ff; }
        select { width: 100%; padding: 0.75rem; border-radius: 8px; background: #1a1a2e; color: #fff; }
        .loading { display: none; text-align: center; }
        .loading.active { display: block; }
        .spinner { border: 4px solid #333; border-top-color: #00d9ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 DeepFrameC - DeepFake Detection</h1>
        <div class="main-content">
            <div class="upload-section">
                <div class="drop-zone" id="dropZone">
                    <p>Drag & drop or click to upload</p>
                    <input type="file" id="fileInput" accept="video/*,image/*">
                </div>
                <div id="previewContainer" style="margin-top:1rem;"></div>
                <div class="loading" id="loading"><div class="spinner"></div><p>Analyzing...</p></div>
                <div class="result-card" id="results" style="display:none;">
                    <div class="verdict" id="verdict"></div>
                    <div id="confidence"></div>
                    <div class="probs">
                        <div>Real: <span id="realProb">0</span></div>
                        <div>Fake: <span id="fakeProb">0</span></div>
                    </div>
                </div>
                <button class="btn btn-primary" id="detectBtn" disabled>Detect</button>
            </div>
            <div class="settings-section">
                <h3>Settings</h3>
                <label>Threshold: <span id="thresholdVal">0.5</span></label>
                <input type="range" id="threshold" min="0.1" max="0.9" step="0.05" value="0.5">
                <label>Frames: <span id="framesVal">16</span></label>
                <input type="range" id="frames" min="8" max="32" step="4" value="16">
                <label>Model</label>
                <select id="checkpoint"><option value="best.pth">Best</option><option value="last.pth">Last</option></select>
            </div>
        </div>
    </div>
    <script>
        const API = 'http://localhost:8000';
        let file = null;
        const dz = document.getElementById('dropZone');
        dz.onclick = () => document.getElementById('fileInput').click();
        dz.ondrop = e => { e.preventDefault(); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };
        dz.ondragover = e => e.preventDefault();
        document.getElementById('fileInput').onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); };
        document.getElementById('threshold').oninput = e => document.getElementById('thresholdVal').textContent = parseFloat(e.target.value).toFixed(2);
        document.getElementById('frames').oninput = e => document.getElementById('framesVal').textContent = e.target.value;
        function handleFile(f) {
            file = f;
            document.getElementById('previewContainer').innerHTML = '<p>' + f.name + '</p>';
            document.getElementById('detectBtn').disabled = false;
            document.getElementById('results').style.display = 'none';
        }
        document.getElementById('detectBtn').onclick = async () => {
            if(!file) return;
            document.getElementById('loading').classList.add('active');
            const fd = new FormData();
            fd.append('file', file);
            fd.append('threshold', document.getElementById('threshold').value);
            fd.append('num_frames', document.getElementById('frames').value);
            try {
                const r = await fetch(API + '/detect', {method:'POST', body:fd});
                const d = await r.json();
                if(d.status === 'completed') {
                    const res = d.result;
                    const v = document.getElementById('verdict');
                    v.textContent = res.is_fake ? 'FAKE' : 'REAL';
                    v.className = 'verdict ' + (res.is_fake ? 'fake' : 'real');
                    document.getElementById('confidence').textContent = 'Confidence: ' + (res.confidence*100).toFixed(1) + '%';
                    document.getElementById('realProb').textContent = res.real_probability.toFixed(4);
                    document.getElementById('fakeProb').textContent = res.fake_probability.toFixed(4);
                    document.getElementById('results').style.display = 'block';
                }
            } catch(e) { alert('Error: ' + e); }
            document.getElementById('loading').classList.remove('active');
        };
    </script>
</body>
</html>
